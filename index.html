<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guessensus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="single-column">
        <section class="panel panel-featured single-card" id="daily-panel">
          <div class="title-block">
            <p class="artifact-category" id="artifact-category"></p>
            <h1 class="artifact-name" id="artifact-name"></h1>
            <p class="artifact-description" id="artifact-description"></p>
            <div class="date-pill" id="today-date"></div>
            <div class="meta-row">
              <p class="meta-note" id="next-drop-note"></p>
              <button class="meta-link" id="pool-link" type="button">Add to the answer pool</button>
            </div>
          </div>

          <div class="artifact-card">
            <div class="artifact-visual">
              <img id="artifact-image" alt="Today's mystery item" />
            </div>
          </div>
          <div class="asset-meta hidden" id="asset-meta">
            <p class="asset-meta-title">Image source</p>
            <p class="asset-meta-copy" id="asset-attribution"></p>
            <a class="asset-meta-link" id="asset-source-link" target="_blank" rel="noreferrer">
              View original source
            </a>
          </div>

          <div class="prompt-box">
            <p class="prompt-label">Prompt</p>
            <p class="prompt-text" id="daily-prompt"></p>
          </div>

          <form id="guess-form" class="guess-form">
            <label class="guess-label" for="guess-input">Your answer</label>
            <input
              class="guess-input"
              id="guess-input"
              name="guess"
              type="text"
              maxlength="80"
              autocomplete="off"
              placeholder="Type what most people would call it"
            />
          </form>

          <div class="action-row">
            <button class="button button-primary" id="submit-guess">Lock guess</button>
            <button class="button button-secondary" id="reset-guess" type="button">
              Pick again
            </button>
          </div>

          <div class="result-box hidden" id="result-box" aria-live="polite"></div>

          <section class="pool-panel hidden" id="pool-panel">
            <p class="pool-title">Add to the answer pool</p>
            <p class="pool-copy">
              This saves a crowd answer for this item on this browser. It does not affect scoring yet.
            </p>
            <form class="pool-form" id="pool-form">
              <input
                class="guess-input"
                id="pool-input"
                name="pool-answer"
                type="text"
                maxlength="80"
                autocomplete="off"
                placeholder="Type another answer people might say"
              />
              <div class="action-row action-row-tight">
                <button class="button button-primary" type="submit">Save to pool</button>
                <button class="button button-secondary" id="close-pool" type="button">Close</button>
              </div>
            </form>
            <p class="pool-status" id="pool-status"></p>
          </section>
        </section>
      </main>
    </div>

    <script src="./assets/manifest.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
